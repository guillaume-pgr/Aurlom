<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurlom · Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B1524;
  --ink-2:#4A4356;
  --muted:#6E6880;
  --paper:#F7F6F9;
  --card:#FFFFFF;
  --line:#E9E6EF;
  --violet:#5B2D8E;
  --violet-soft:#EFEAF7;
  --neg:#B42318;
  --neg-bg:#FBEAE8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);
  font-size:13px;line-height:1.45;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:34px 32px 30px;width:100%;max-width:360px;
  box-shadow:0 8px 30px rgba(27,21,36,.06);
}
.logo{font-family:'Space Grotesk';font-weight:700;font-size:19px;letter-spacing:.14em;color:var(--ink)}
.logo-sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:3px 0 24px}
h1{font-family:'Space Grotesk';font-size:16px;font-weight:600;margin-bottom:4px}
.hint{font-size:12px;color:var(--muted);margin-bottom:20px}
label{display:block;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
input[type=password]{
  width:100%;padding:11px 13px;font-family:'Inter';font-size:14px;color:var(--ink);
  background:var(--paper);border:1px solid var(--line);border-radius:8px;outline:none;
}
input[type=password]:focus{border-color:var(--violet);background:#fff}
button{
  width:100%;margin-top:18px;padding:12px;font-family:'Inter';font-size:13px;font-weight:600;
  color:#fff;background:var(--violet);border:none;border-radius:8px;cursor:pointer;
  letter-spacing:.02em;
}
button:hover{background:#4a2475}
.err{
  background:var(--neg-bg);color:var(--neg);border-radius:8px;
  padding:9px 12px;font-size:12px;margin-bottom:18px;font-weight:500;
}
.foot{margin-top:22px;font-size:10.5px;color:var(--muted);text-align:center}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="logo">AURLOM</div>
    <div class="logo-sub">Pilotage Groupe</div>
    <h1>Accès protégé</h1>
    <p class="hint">Saisissez le mot de passe partagé pour accéder au tableau de bord.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" required>
    <button type="submit">Se connecter</button>
    <div class="foot">Session sécurisée · valable 30 jours</div>
  </form>
</body>
</html>
